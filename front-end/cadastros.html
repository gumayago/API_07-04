<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body>
    <header>
        <h1>Jogos API</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="cadastro.html" class="active">Cadastros</a>
        </nav>
    </header>
    <main class="container">
        <section class="hero">
            <p class="eyebrow">Cadastro</p>
            <h2>Cadastrar Categorias e Jogos</h2>
        </section>

        <section class="grid-2">
            <article class="panel">
                <h3>Nova Categoria</h3>
                <form id="categoria-form" class="stack">
                <input type="text" id="categoria-nome" placeholder="Nome" required />
                <button type="submit">Cadastrar Categoria</button>
                </form>
            </article>

            <article class="panel">
                <h3>Novo Jogo</h3>
                <form id="jogo-form" class="stack">
                <input type="text" id="jogo-nome" placeholder="Nome" required />
                <input type="text" id="jogo-genero" placeholder="Genero" required />
                <select id="jogo-categoria_id" required></select>
                <button type="submit">Cadastrar Jogo</button>
                </form>
            </article>
        </section>
    </main>
    
    <script src="js/cadastro.js"></script>
</body>
</html>
