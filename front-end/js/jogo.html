<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sstyle.css">
    <title>Detalhes do Jogo - API</title>
</head>
<body>
    <header>
        <h1>jogos API</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="">cadastros</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <p class="eyebrow" id="jogo-categoria">Categoria</p>
            <h2 id="jogo-titulo">Nome do Jogo</h2>
            <a href="index.html" class="btn-voltar">← Voltar para a lista</a>
        </section>

        <section class="perfil-grid">
            <div class="panel">
                <img src="" alt="Capa do Jogo" id="jogo-imagem" class="img-perfil">
            </div>
            
            <div class="panel">
                <h3>Informações</h3>
                <div class="detalhes">
                    <p><strong>Desenvolvedora:</strong> <span id="jogo-developer">---</span></p>
                    <p><strong>Lançamento:</strong> <span id="jogo-data">---</span></p>
                    <p><strong>Plataforma:</strong> <span id="jogo-plataforma">---</span></p>
                </div>
                <hr>
                <h3>Descrição</h3>
                <p id="jogo-descricao">Carregando descrição...</p>
                
                <a href="#" id="jogo-link" target="_blank" class="btn-link">Página Oficial</a>
            </div>
        </section>
    </main>

    <!-- Script específico para carregar os dados do jogo -->
    <script src="./js/perfil.js"></script>
</body>
</html>
